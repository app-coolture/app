<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Coolture – Registre</title>

    <!-- ========== ICONOS / PWA ========== -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c5a866">

    <!-- MODO APP (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Coolture">
    <!-- ================================== -->

    <style>
        :root {
            --gold: #c5a866;
            --green: #6b7a5a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            background-color: var(--gold);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            border-radius: 0;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            padding-top: constant(safe-area-inset-top);
            padding-top: env(safe-area-inset-top);
            padding-bottom: constant(safe-area-inset-bottom);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .content {
            width: 85%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            flex: 1;
            justify-content: flex-start;  /* logo al mateix lloc que a les altres pàgines */
            padding: 20px 0 40px 0;
        }

        /* Logo i lema idèntics a escull.html i login.html */
        .logo {
            width: clamp(200px, 70vw, 300px);
            margin-top: clamp(80px, 20vh, 140px);
            margin-bottom: 10px;
        }

        .tagline {
            color: var(--white);
            font-size: clamp(12px, 4vw, 14px);
            margin-top: 5px;
            margin-bottom: clamp(30px, 8vh, 50px);
            opacity: 0.9;
        }

        /* Formulari */
        .form {
            width: 100%;
            margin-top: 15px;
        }

        /* Camps d'entrada */
        .form input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--white);
            color: var(--white);
            padding: 10px 0;
            font-size: clamp(14px, 4vw, 16px);
            margin-bottom: 5px;
            outline: none;
            box-sizing: border-box;
        }

        .form input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Selector personalitzat */
        .custom-select-container {
            position: relative;
            width: 110px;
            font-family: inherit;
            flex-shrink: 0;
        }

        .select-trigger {
            width: 100%;
            background: transparent;
            border-bottom: 1px solid var(--white);
            border-top: none;
            border-left: none;
            border-right: none;
            padding: 10px 0;
            font-size: clamp(12px, 3.5vw, 13px);
            color: var(--white);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .options-menu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 250px;
            max-width: 90vw;
            max-height: 200px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-top: 5px;
            overflow-y: auto;
            display: none;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .options-menu.show {
            display: block;
        }

        .search-box {
            width: 100%;
            padding: 8px;
            border: none;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            outline: none;
            font-size: 12px;
        }

        .option-item {
            padding: 10px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid #f9f9f9;
            color: #333;
        }

        .option-item:hover {
            background-color: #f4f1e8;
            color: #667F57;
        }

        .small-text {
            color: var(--white);
            font-size: clamp(9px, 3vw, 10px);
            text-align: left;
            width: 100%;
            margin: 15px 0 5px 0;
        }

        /* Botons unificats */
        .btn {
            padding: 12px 16px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            font-size: clamp(12px, 3.5vw, 14px);
            transition: transform 0.2s ease;
            text-align: center;
            width: 100%;
            max-width: 220px;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-white {
            background: var(--white);
            color: #333;
        }
        .btn-submit {
            display: block;
            margin: 30px auto 10px auto;
        }

        /* Fila telèfon */
        .phone-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .phone-row input[type="text"] {
            flex: 1;
            min-width: 120px;
        }

        /* Media queries per a pantalles petites */
        @media (max-width: 400px) {
            .content {
                width: 88%;
                padding: 15px 0 30px 0;
            }
            .custom-select-container {
                width: 100px;
            }
            .select-trigger {
                padding: 8px 0;
            }
            .form input {
                padding: 8px 0;
            }
            .btn {
                padding: 10px;
            }
        }

        @media (max-width: 360px) {
            .content {
                width: 90%;
            }
            .logo {
                margin-top: clamp(60px, 15vh, 100px);
            }
            .tagline {
                margin-bottom: clamp(20px, 6vh, 40px);
            }
            .phone-row {
                flex-direction: column;
                gap: 12px;
            }
            .custom-select-container {
                width: 100%;
            }
            .phone-row input[type="text"] {
                width: 100%;
            }
        }

        @media (max-width: 320px) {
            .form input {
                font-size: 13px;
            }
            .btn {
                font-size: 12px;
                padding: 8px;
            }
            .small-text {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="content">
        <img src="images/logos-02.png" class="logo" alt="Coolture Logo">
        <p class="tagline">Explora cultures, Aprèn, Connecta</p>

        <form class="form" action="comenca.html" onsubmit="return checkPrefix()">
            <input type="email" placeholder="Email*" required>
            <input type="password" placeholder="Contrasenya*" required>
            <input type="text" placeholder="Nom*" required>
            <input type="text" placeholder="Cognom*" required>

            <div class="phone-row">
                <div class="custom-select-container">
                    <div class="select-trigger" id="selectTrigger">
                        <span id="selectedLabel">Prefix*</span>
                        <span style="font-size: 10px;">▼</span>
                    </div>

                    <div class="options-menu" id="optionsMenu">
                        <input type="text" class="search-box" id="searchBox" placeholder="Buscar país...">
                        <div id="countriesList"></div>
                    </div>

                    <input type="hidden" id="prefixValue" name="prefix" required>
                </div>

                <input type="text" placeholder="Telèfon*" required>
            </div>

            <p class="small-text">T'enviarem un SMS per verificar el teu telèfon</p>
            <input type="text" placeholder="DNI/NIF/NIE*" required>
            <input type="text" placeholder="Nom d'usuari*" required>

            <button type="submit" class="btn btn-white btn-submit">
                Crear compte
            </button>
        </form>
    </div>
</div>

<script>

"},{n:"Japó",c:"+81"},{n:"Jordània",c:"+962"},{n:"Kazakhstan",c:"+7"},{n:"Kenya",c:"+254"},{n:"Kiribati",c:"+686"},{n:"Corea del Nord",c:"+850"},{n:"Corea del Sud",c:"+82"},{n:"Kuwait",c:"+965"},{n:"Kirguizistan",c:"+996"},{n:"Laos",c:"+856"},{n:"Letònia",c:"+371"},{n:"Líban",c:"+961"},{n:"Lesotho",c:"+266"},{n:"Libèria",c:"+231"},{n:"Líbia",c:"+218"},{n:"Liechtenstein",c:"+423"},{n:"Lituània",c:"+370"},{n:"Luxemburg",c:"+352"},{n:"Madagascar",c:"+261"},{n:"Malawi",c:"+265"},{n:"Malàisia",c:"+60"},{n:"Maldives",c:"+960"},{n:"Mali",c:"+223"},{n:"Malta",c:"+356"},{n:"Illes Marshall",c:"+692"},{n:"Mauritània",c:"+222"},{n:"Maurici",c:"+230"},{n:"Mèxic",c:"+52"},{n:"Micronèsia",c:"+691"},{n:"Moldàvia",c:"+373"},{n:"Mònaco",c:"+377"},{n:"Mongòlia",c:"+976"},{n:"Montenegro",c:"+382"},{n:"Marroc",c:"+212"},{n:"Moçambic",c:"+258"},{n:"Myanmar",c:"+95"},{n:"Namíbia",c:"+264"},{n:"Nauru",c:"+674"},{n:"Nepal",c:"+977"},{n:"Països Baixos",c:"+31"},{n:"Nova Zelanda",c:"+64"},{n:"Nicaragua",c:"+505"},{n:"Níger",c:"+227"},{n:"Nigèria",c:"+234"},{n:"Noruega",c:"+47"},{n:"Oman",c:"+968"},{n:"Pakistan",c:"+92"},{n:"Palau",c:"+680"},{n:"Panamà",c:"+507"},{n:"Papua Nova Guinea",c:"+675"},{n:"Paraguai",c:"+595"},{n:"Perú",c:"+51"},{n:"Filipines",c:"+63"},{n:"Polònia",c:"+48"},{n:"Portugal",c:"+351"},{n:"Qatar",c:"+974"},{n:"Romania",c:"+40"},{n:"Rússia",c:"+7"},{n:"Ruanda",c:"+250"},{n:"Saint Kitts i Nevis",c:"+1"},{n:"Saint Lucia",c:"+1"},{n:"Saint Vincent i les Grenadines",c:"+1"},{n:"Samoa",c:"+685"},{n:"San Marino",c:"+378"},{n:"São Tomé i Príncipe",c:"+239"},{n:"Aràbia Saudita",c:"+966"},{n:"Senegal",c:"+221"},{n:"Sèrbia",c:"+381"},{n:"Seychelles",c:"+248"},{n:"Sierra Leone",c:"+232"},{n:"Singapur",c:"+65"},{n:"Eslovàquia",c:"+421"},{n:"Eslovènia",c:"+386"},{n:"Illes Salomó",c:"+677"},{n:"Somàlia",c:"+252"},{n:"Sud-àfrica",c:"+27"},{n:"Espanya",c:"+34"},{n:"Sri Lanka",c:"+94"},{n:"Sudan",c:"+249"},{n:"Sudan del Sud",c:"+211"},{n:"Surinam",c:"+597"},{n:"Suècia",c:"+46"},{n:"Suïssa",c:"+41"},{n:"Síria",c:"+963"},{n:"Taiwan",c:"+886"},{n:"Tadjikistan",c:"+992"},{n:"Tanzània",c:"+255"},{n:"Tailàndia",c:"+66"},{n:"Timor Oriental",c:"+670"},{n:"Togo",c:"+228"},{n:"Tonga",c:"+676"},{n:"Trinitat i Tobago",c:"+1"},{n:"Tunísia",c:"+216"},{n:"Turquia",c:"+90"},{n:"Turkmenistan",c:"+993"},{n:"Tuvalu",c:"+688"},{n:"Uganda",c:"+256"},{n:"Ucraïna",c:"+380"},{n:"Estats Units",c:"+1"},{n:"Uruguai",c:"+598"},{n:"Uzbekistan",c:"+998"},{n:"Vanuatu",c:"+678"},{n:"Vaticà",c:"+379"},{n:"Veneçuela",c:"+58"},{n:"Vietnam",c:"+84"},{n:"Iemen",c:"+967"},{n:"Zàmbia",c:"+260"},{n:"Zimbàbue",c:"+263"}
];

const trigger = document.getElementById('selectTrigger');
const menu = document.getElementById('optionsMenu');
const list = document.getElementById('countriesList');
const search = document.getElementById('searchBox');
const selectedLabel = document.getElementById('selectedLabel');
const hiddenInput = document.getElementById('prefixValue');

function renderCountries(filter = "") {
    list.innerHTML = "";
    const filtered = countryCodes.filter(item =>
        item.n.toLowerCase().includes(filter.toLowerCase()) ||
        item.c.includes(filter)
    );
    filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'option-item';
        div.innerHTML = `<strong>${item.c}</strong> ${item.n}`;
        div.onclick = () => {
            selectedLabel.innerText = item.c;
            hiddenInput.value = item.c;
            menu.classList.remove('show');
        };
        list.appendChild(div);
    });
}

trigger.onclick = () => {
    menu.classList.toggle('show');
    search.focus();
};
search.oninput = (e) => renderCountries(e.target.value);
window.onclick = (e) => {
    if (!trigger.contains(e.target) && !menu.contains(e.target)) {
        menu.classList.remove('show');
    }
};
function checkPrefix() {
    if (!hiddenInput.value) {
        alert("Si us plau, selecciona un prefix");
        return false;
    }
    return true;
}
renderCountries();
</script>
</body>
</html>
