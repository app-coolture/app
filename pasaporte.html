<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coolture - Passaport</title>
    <style>
        :root { --bg-color: #F5F1E8; --green-coolture: #667F57; --select-bg: #F4F1E8; --white: #ffffff; }
        body, html { margin: 0; padding: 0; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .container { width: 375px; height: 812px; background-color: var(--bg-color); border-radius: 40px; overflow: hidden; position: relative; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .notch { width: 120px; height: 35px; border-radius: 20px; margin: 12px auto; background: black; }
        
        .content { flex-grow: 1; padding: 20px; text-align: center; overflow-y: auto; padding-bottom: 100px; }
        h1 { color: var(--green-coolture); margin-bottom: 20px; }
        
        .stamps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stamp-card { background: white; padding: 15px; border-radius: 20px; border: 2px dashed var(--green-coolture); display: flex; flex-direction: column; align-items: center; opacity: 0.5; }
        .stamp-card.unlocked { opacity: 1; border-style: solid; }
        .stamp-icon { width: 60px; height: 60px; background: #eee; border-radius: 50%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; }

        /* NAVBAR (Mismo estilo que Forum/Quizz) */
        .navbar { position: absolute; bottom: 0; width: 100%; height: 85px; background-color: var(--green-coolture); display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; box-sizing: border-box; }
        .nav-item { display: flex; align-items: center; justify-content: center; text-decoration: none; width: 65px; height: 60px; }
        .nav-item.active { background-color: var(--select-bg); border-radius: 20px; }
        .nav-icon { width: 45px; height: 45px; object-fit: contain; }
    </style>
</head>
<body>
    <div class="container">
        <div class="notch"></div>
        <div class="content">
            <h1>El teu Passaport</h1>
            <div class="stamps-grid">
                <div class="stamp-card unlocked">
                    <div class="stamp-icon">🍜</div>
                    <span>Gourmet Asia</span>
                </div>
                <div class="stamp-card unlocked">
                    <div class="stamp-icon">🏛️</div>
                    <span>Arquitecte</span>
                </div>
                <div class="stamp-card">
                    <div class="stamp-icon">🗿</div>
                    <span>Explorador</span>
                </div>
                <div class="stamp-card">
                    <div class="stamp-icon">💃</div>
                    <span>Folklore</span>
                </div>
            </div>
        </div>
        <nav class="navbar">
            <a href="culturas.html" class="nav-item"><img src="images/forum.png" class="nav-icon"></a>
            <a href="quizz.html" class="nav-item"><img src="images/quizz.png" class="nav-icon"></a>
            <a href="pasaporte.html" class="nav-item active"><img src="images/passaport2.png" class="nav-icon"></a>
            <a href="perfil.html" class="nav-item"><img src="images/perfil.png" class="nav-icon"></a>
        </nav>
    </div>
</body>
</html>
