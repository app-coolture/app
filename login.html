<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Coolture - Registre</title>
    <style>
        /* ===== ESTILS EXISTENTS (NO MODIFICATS) ===== */
        :root {
            --gold: #c5a866;
            --green: #6b7a5a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenidor principal: ample fix 390px, sense cantonades arrodonides */
        .container {
            width: 390px;
            min-height: 100vh;
            background-color: var(--gold);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            border-radius: 0;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Notch eliminat completament */

        .content {
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px 0 40px 0;
        }

        .logo {
            width: 180px;
            margin-top: 50px;
        }

        .tagline {
            color: var(--white);
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        /* Formulari */
        .form {
            width: 100%;
            margin-top: 20px;
        }

        .form input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--white);
            color: var(--white);
            padding: 10px 0;
            margin-bottom: 5px;
            outline: none;
            font-size: 16px;
            box-sizing: border-box;
        }

        .form input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .small-text {
            color: var(--white);
            font-size: 10px;
            text-align: left;
            width: 100%;
            margin: 15px 0 5px 0;
        }

        /* Botons */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-white {
            background: var(--white);
            color: #333;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
        }

        .btn-submit {
            border: none;
            width: 100%;
            cursor: pointer;
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 12px;
            font-family: inherit;
        }

        /* 🔴 Error visual */
        .input-error {
            border: 1px solid #e74c3c !important;
        }

        /* 📝 Texto error */
        .error-text {
            font-size: 11px;
            color: #e74c3c;
            margin: 4px 0 8px 2px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Notch eliminat -->
    <div class="content">
        <img src="images/logos-02.png" class="logo">
        
        <form class="form" style="margin-top: 40px;" onsubmit="return validateForm()" action="comenca.html">
            
            <input type="text" id="email" placeholder="Email*">
            <div class="error-text" id="emailError"></div>
            
            <input type="password" id="password" placeholder="Contrasenya*">
            <div class="error-text" id="passwordError"></div>
            
            <input type="text" id="username" placeholder="Nom d'usuari*">
            <div class="error-text" id="usernameError"></div>
            
            <p class="small-text">T'enviarem un codi per verificar el teu correu</p>
            
            <button type="submit" class="btn btn-white btn-submit" style="margin-top: 40px;">
                Inicia sessió
            </button>
            
        </form>
    </div>
</div>

<script>
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const usernameInput = document.getElementById("username");

const emailError = document.getElementById("emailError");
const passwordError = document.getElementById("passwordError");
const usernameError = document.getElementById("usernameError");

// Validación en tiempo real
emailInput.oninput = () => validateEmail();
passwordInput.oninput = () => validatePassword();
usernameInput.oninput = () => validateUsername();

function showError(input, errorDiv, message) {
    input.classList.add("input-error");
    errorDiv.style.display = "block";
    errorDiv.innerText = message;
}

function clearError(input, errorDiv) {
    input.classList.remove("input-error");
    errorDiv.style.display = "none";
}

function validateEmail() {
    const value = emailInput.value.trim();
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (value === "") {
        showError(emailInput, emailError, "Aquest camp és obligatori");
        return false;
    } else if (!regex.test(value)) {
        showError(emailInput, emailError, "Email no vàlid");
        return false;
    } else {
        clearError(emailInput, emailError);
        return true;
    }
}

function validatePassword() {
    const value = passwordInput.value.trim();

    if (value === "") {
        showError(passwordInput, passwordError, "Aquest camp és obligatori");
        return false;
    } else if (value.length < 6) {
        showError(passwordInput, passwordError, "Mínim 6 caràcters");
        return false;
    } else {
        clearError(passwordInput, passwordError);
        return true;
    }
}

function validateUsername() {
    const value = usernameInput.value.trim();

    if (value === "") {
        showError(usernameInput, usernameError, "Aquest camp és obligatori");
        return false;
    } else if (value.length < 3) {
        showError(usernameInput, usernameError, "Mínim 3 caràcters");
        return false;
    } else {
        clearError(usernameInput, usernameError);
        return true;
    }
}

function validateForm() {
    const validEmail = validateEmail();
    const validPassword = validatePassword();
    const validUsername = validateUsername();

    return validEmail && validPassword && validUsername;
}
</script>
</body>
</html>
