<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Coolture - Registre</title>
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --gold: #c5a866;
            --green: #6b7a5a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }

        /* Contenidor principal: OCUPA EL 100% DEL ANCHO (SIN LÍMITE FIJO) */
        .container {
            width: 100%;
            min-height: 100vh;
            background-color: var(--gold);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            border-radius: 0;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            /* Espacio dinámico para el notch */
            padding-top: constant(safe-area-inset-top);
            padding-top: env(safe-area-inset-top);
            padding-bottom: constant(safe-area-inset-bottom);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .content {
            width: 85%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px 0 40px 0;
            flex: 1;
            justify-content: center;
        }

        .logo {
            width: clamp(140px, 40vw, 180px);
            margin-top: clamp(30px, 10vh, 50px);
        }

        .tagline {
            color: var(--white);
            font-size: clamp(12px, 3.5vw, 14px);
            margin-top: 5px;
            margin-bottom: clamp(20px, 8vh, 50px);
            opacity: 0.9;
        }

        /* Formulari */
        .form {
            width: 100%;
            margin-top: 20px;
        }

        .form input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--white);
            color: var(--white);
            padding: 10px 0;
            margin-bottom: 5px;
            outline: none;
            font-size: clamp(14px, 4vw, 16px);
            box-sizing: border-box;
        }

        .form input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .small-text {
            color: var(--white);
            font-size: clamp(9px, 3vw, 10px);
            text-align: left;
            width: 100%;
            margin: 15px 0 5px 0;
        }

        /* Botons */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: clamp(12px, 3.5vw, 14px);
            transition: transform 0.2s ease;
        }
        .btn:active {
            transform: scale(0.97);
        }

        .btn-white {
            background: var(--white);
            color: #333;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
        }

        .btn-submit {
            border: none;
            width: 100%;
            cursor: pointer;
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 12px;
            font-family: inherit;
            margin-top: clamp(20px, 6vh, 40px);
        }

        /* 🔴 Error visual */
        .input-error {
            border: 1px solid #e74c3c !important;
            border-radius: 4px;
        }

        /* 📝 Texto error */
        .error-text {
            font-size: clamp(10px, 3vw, 11px);
            color: #e74c3c;
            margin: 4px 0 8px 2px;
            display: none;
            text-align: left;
        }

        /* Media queries para pantallas pequeñas */
        @media (max-width: 400px) {
            .content {
                width: 88%;
                padding: 15px 0 30px 0;
            }
            .form input {
                padding: 8px 0;
            }
            .btn {
                padding: 10px;
            }
        }

        @media (max-width: 360px) {
            .content {
                width: 90%;
            }
            .logo {
                margin-top: clamp(20px, 5vh, 30px);
            }
        }

        @media (max-width: 320px) {
            .form input {
                font-size: 13px;
            }
            .btn {
                font-size: 12px;
                padding: 8px;
            }
            .small-text {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="content">
        <img src="images/logos-02.png" class="logo" alt="Coolture Logo">
        
        <form class="form" style="margin-top: 40px;" onsubmit="return validateForm()" action="comenca.html">
            
            <input type="text" id="email" placeholder="Email*">
            <div class="error-text" id="emailError"></div>
            
            <input type="password" id="password" placeholder="Contrasenya*">
            <div class="error-text" id="passwordError"></div>
            
            <input type="text" id="username" placeholder="Nom d'usuari*">
            <div class="error-text" id="usernameError"></div>
            
            <p class="small-text">T'enviarem un codi per verificar el teu correu</p>
            
            <button type="submit" class="btn btn-white btn-submit">
                Inicia sessió
            </button>
            
        </form>
    </div>
</div>

<script>
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const usernameInput = document.getElementById("username");

const emailError = document.getElementById("emailError");
const passwordError = document.getElementById("passwordError");
const usernameError = document.getElementById("usernameError");

// Validación en tiempo real
emailInput.oninput = () => validateEmail();
passwordInput.oninput = () => validatePassword();
usernameInput.oninput = () => validateUsername();

function showError(input, errorDiv, message) {
    input.classList.add("input-error");
    errorDiv.style.display = "block";
    errorDiv.innerText = message;
}

function clearError(input, errorDiv) {
    input.classList.remove("input-error");
    errorDiv.style.display = "none";
}

function validateEmail() {
    const value = emailInput.value.trim();
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (value === "") {
        showError(emailInput, emailError, "Aquest camp és obligatori");
        return false;
    } else if (!regex.test(value)) {
        showError(emailInput, emailError, "Email no vàlid");
        return false;
    } else {
        clearError(emailInput, emailError);
        return true;
    }
}

function validatePassword() {
    const value = passwordInput.value.trim();

    if (value === "") {
        showError(passwordInput, passwordError, "Aquest camp és obligatori");
        return false;
    } else if (value.length < 6) {
        showError(passwordInput, passwordError, "Mínim 6 caràcters");
        return false;
    } else {
        clearError(passwordInput, passwordError);
        return true;
    }
}

function validateUsername() {
    const value = usernameInput.value.trim();

    if (value === "") {
        showError(usernameInput, usernameError, "Aquest camp és obligatori");
        return false;
    } else if (value.length < 3) {
        showError(usernameInput, usernameError, "Mínim 3 caràcters");
        return false;
    } else {
        clearError(usernameInput, usernameError);
        return true;
    }
}

function validateForm() {
    const validEmail = validateEmail();
    const validPassword = validatePassword();
    const validUsername = validateUsername();

    return validEmail && validPassword && validUsername;
}
</script>
</body>
</html>
