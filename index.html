<!DOCTYPE html>
<html lang="ca" manifest="cache.manifest">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Coolture - Inici</title>
    <link rel="icon" sizes="192x192" href="icon.png">
    <link rel="icon" sizes="512x512" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        /* ===== ESTILS EXISTENTS (NO MODIFICATS) ===== */
        :root {
            --gold: #c5a866;
            --green: #6b7a5a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Contenidor principal: ample fix 390px, sense cantonades arrodonides */
        .container {
            width: 390px;
            min-height: 100vh;
            background-color: var(--gold);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            border-radius: 0;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Notch eliminat completament */

        .logo-center {
            width: 200px;
            height: auto;
            position: absolute;
            left: 50%;
            top: -30%;
            transform: translate(-50%, -50%);
            animation: dropAndZoom 3s ease-in-out forwards;
        }

        @keyframes dropAndZoom {
            0% {
                top: -30%;
                transform: translate(-50%, -50%) scale(1);
            }
            40% {
                top: 52%;
                transform: translate(-50%, -50%) scale(1.05);
                animation-timing-function: cubic-bezier(0.68, -0.55, 0.27, 1.55);
            }
            55% {
                top: 48%;
                transform: translate(-50%, -50%) scale(0.98);
            }
            65% {
                top: 50%;
                transform: translate(-50%, -50%) scale(1.02);
            }
            70% {
                top: 50%;
                transform: translate(-50%, -50%) scale(1);
            }
            85% {
                top: 50%;
                transform: translate(-50%, -50%) scale(8);
            }
            100% {
                top: 50%;
                transform: translate(-50%, -50%) scale(20);
                opacity: 0;
            }
        }

        /* ===== ESTILS ADDICIONALS (SENSE MODIFICAR ELS ANTERIORS) ===== */
        .content {
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .tagline {
            color: var(--white);
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .form {
            width: 100%;
            margin-top: 20px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--white);
            color: var(--white);
            padding: 10px 0;
            margin-bottom: 15px;
            outline: none;
            font-size: 16px;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .small-text {
            color: var(--white);
            font-size: 10px;
            text-align: left;
            width: 100%;
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-white {
            background: var(--white);
            color: #333;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
        }

        .split-bg {
            background: linear-gradient(150deg, var(--gold) 55%, var(--green) 55.2%);
        }

        .nav-icon {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Notch eliminat -->
    <a href="#" id="logoLink">
        <img src="images/logos-03.png" class="logo-center" alt="Coolture Logo">
    </a>
</div>

<script>
    // Redirecció original (no modificada)
    setTimeout(() => {
        window.location.href = "escull.html";
    }, 3000);

    // ========== REGISTRE DEL SERVICE WORKER PER PWA ==========
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('Service Worker registrat amb èxit:', registration);
                })
                .catch(error => {
                    console.log('Error en registrar el Service Worker:', error);
                });
        });
    }
    // ========================================================
</script>
</body>
</html>
