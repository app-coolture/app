<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Coolture – Inici</title>

    <!-- ========== ICONOS / PWA ========== -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c5a866">

    <!-- MODO APP (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Coolture">
    <!-- ================================== -->

    <style>
        :root {
            --gold: #c5a866;
            --green: #6b7a5a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            background-color: var(--gold);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            border-radius: 0;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            padding-top: constant(safe-area-inset-top);
            padding-top: env(safe-area-inset-top);
            padding-bottom: constant(safe-area-inset-bottom);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .content {
            width: 85%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            flex: 1;
            /* 🔁 Ara tot comença des de la part superior */
            justify-content: flex-start;
        }

        .logo {
            width: clamp(200px, 70vw, 300px);
            margin-top: clamp(80px, 20vh, 140px);
            margin-bottom: 10px;
        }

        .tagline {
            color: var(--white);
            font-size: clamp(12px, 4vw, 14px);
            margin-top: 5px;
            margin-bottom: clamp(30px, 8vh, 50px);
            opacity: 0.9;
        }

        .botones-estrechos {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-top: clamp(120px, 25vh, 260px);
        }

        .btn {
            padding: 12px 16px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            font-size: clamp(12px, 3.5vw, 14px);
            transition: transform 0.2s ease;
            text-align: center;
            width: 100%;
            max-width: 220px;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-white {
            background: var(--white);
            color: #333;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
        }

        @media (max-width: 400px) {
            .content {
                width: 90%;
            }
            .btn {
                width: 80%;
                padding: 10px 14px;
            }
            .botones-estrechos {
                gap: 12px;
            }
        }

        @media (max-width: 360px) {
            .logo {
                margin-top: clamp(60px, 15vh, 100px);
            }
            .tagline {
                margin-bottom: clamp(20px, 6vh, 40px);
            }
            .botones-estrechos {
                margin-top: clamp(80px, 20vh, 200px);
            }
        }

        @media (max-width: 320px) {
            .btn {
                font-size: 11px;
                padding: 7px 12px;
            }
            .botones-estrechos {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="content">
        <img src="images/logos-02.png" class="logo" alt="Coolture Logo">
        <p class="tagline">Explora cultures, Aprèn, Connecta</p>

        <div class="botones-estrechos">
            <a href="registre.html" class="btn btn-white">Registrar-se</a>
            <a href="login.html" class="btn btn-white">Inicia Sessió</a>
        </div>
    </div>
</div>
</body>
</html>
