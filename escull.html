<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Coolture - Inici</title>
    <style>
        /* ===== ESTILS EXISTENTS (NO MODIFICATS) ===== */
        :root {
            --gold: #c5a866;
            --green: #6b7a5a;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Contenidor principal: ample fix 390px, sense cantonades arrodonides */
        .container {
            width: 390px;
            min-height: 100vh;
            background-color: var(--gold);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            border-radius: 0;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Notch eliminat completament */

        .content {
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* LOGO: més gran (300px) */
        .logo { 
            width: 300px;       /* abans 250px → més gran */
            margin-top: 140px;
        }
        .logo-center { margin-top: 280px; width: 120px; }

        .tagline {
            color: var(--white);
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        /* Formulario */
        .form { width: 100%; margin-top: 20px; }
        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--white);
            color: var(--white);
            padding: 10px 0;
            margin-bottom: 15px;
            outline: none;
            font-size: 16px;
        }
        input::placeholder { color: rgba(255,255,255,0.7); }

        .small-text {
            color: var(--white);
            font-size: 10px;
            text-align: left;
            width: 100%;
            margin-bottom: 15px;
        }

        /* Botones */
        .btn {
            padding: 8px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 0;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-white { background: var(--white); color: #333; }
        .btn-outline { background: transparent; border: 1px solid var(--white); color: var(--white); }

        /* Botones más arriba (margin-top reducido) y con separación */
        .botones-estrechos {
            margin-top: 260px;      /* abans 340px → més amunt */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .botones-estrechos .btn {
            width: 70%;
            max-width: 220px;
            text-align: center;
        }

        /* Imagen del icono */
        .nav-icon {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Notch eliminat -->
    <div class="content">
        <img src="images/logos-02.png" class="logo">
        <p class="tagline">Explora cultures, Aprèn, Connecta</p>
        
        <div class="botones-estrechos">
            <a href="registre.html" class="btn btn-white">Registrar-se</a>
            <a href="login.html" class="btn btn-white">Inicia Sessió</a>
        </div>
    </div>
</div>
</body>
</html>
