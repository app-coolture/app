<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Coolture · Interessos</title>
    <style>
        :root {
            --verde: #6b7a5a;
            --crema: #f5f2eb;
            --oro: #c5a866;
            --blanco: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 100%;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            background-color: var(--crema);
            border-radius: 0;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            padding-top: constant(safe-area-inset-top);
            padding-top: env(safe-area-inset-top);
            padding-bottom: constant(safe-area-inset-bottom);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ===== HEADER FIJO (FIXED) ===== */
        .header {
            background-color: #F4F1E8;
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--blanco);
            z-index: 20;
            flex-shrink: 0;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            margin-top: constant(safe-area-inset-top);
            margin-top: env(safe-area-inset-top);
            padding-top: 30px;
            align-items: flex-start;
        }

        .step-indicator {
            font-size: clamp(12px, 3vw, 14px);
            color: #2E2E2E;
            font-weight: 300;
            text-align: left;
            padding: 0 20px;
            margin: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .pregunta {
            margin-top: 10px;
            font-size: clamp(22px, 7vw, 28px);
            font-weight: 700;
            text-align: left;
            color: #2E2E2E;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .sub-pregunta {
            font-size: clamp(12px, 3.5vw, 14px);
            color: #2E2E2E;
            text-align: left;
            padding: 0 20px;
            margin-top: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        /* ===== CONTENEDOR AMB SCROLL I DEGRADATS ===== */
        .columna-interessos {
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            flex-grow: 1;
            padding: 40px 0;
            gap: clamp(12px, 3vh, 20px);
            scrollbar-width: none;
            position: relative;
            /* Añadidos 50px extra al final para bajar las respuestas */
            margin-top: calc(
                constant(safe-area-inset-top) + 30px + 
                (1.4 * clamp(12px, 3vw, 14px)) + 
                10px + 
                (1.2 * clamp(22px, 7vw, 28px)) + 
                4px + 
                (1.3 * clamp(12px, 3.5vw, 14px)) + 
                40px + 50px
            );
            margin-top: calc(
                env(safe-area-inset-top) + 30px + 
                (1.4 * clamp(12px, 3vw, 14px)) + 
                10px + 
                (1.2 * clamp(22px, 7vw, 28px)) + 
                4px + 
                (1.3 * clamp(12px, 3.5vw, 14px)) + 
                40px + 50px
            );
        }

        .columna-interessos::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, var(--crema), transparent);
            pointer-events: none;
            z-index: 5;
        }

        .columna-interessos::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to top, var(--crema), transparent);
            pointer-events: none;
            z-index: 5;
        }

        .columna-interessos::-webkit-scrollbar {
            display: none;
        }

        /* Botones estilo rectángulo blanco, ahora con texto a la izquierda y minúsculas */
        .btn-opcio {
            font-size: clamp(14px, 4vw, 16px);
            color: #2E2E2E;
            background-color: var(--blanco);
            border-radius: 16px;
            padding: 14px 20px;                /* padding izquierdo para indentar */
            width: 90%;
            max-width: 340px;
            text-align: left;                  /* alineado a la izquierda */
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: none;              /* sin mayúsculas forzadas */
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: none;
            display: block;
        }

        .btn-opcio:active {
            background-color: rgba(197, 168, 102, 0.15);
            transform: scale(1.02);
        }

        @media (max-width: 400px) {
            .columna-interessos { padding: 30px 0; }
        }

        @media (max-width: 360px) {
            .columna-interessos { padding: 20px 0; gap: 15px; }
        }

        @media (max-width: 320px) {
            .btn-opcio { padding: 12px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <p class="step-indicator">Pas 2 de 3</p>
        <h2 class="pregunta">Com prefereixes explorar?</h2>
        <p class="sub-pregunta">Quan descobreixes una cultura nova, què et crida més?</p>
    </div>

    <div class="columna-interessos">
        <a href="pregunta3.html?interes=diferent" class="btn-opcio">El que és diferent a la meva</a>
        <a href="pregunta3.html?interes=familiar" class="btn-opcio">El que em resulta familiar</a>
        <a href="pregunta3.html?interes=noentenc" class="btn-opcio">El que no entenc</a>
        <a href="pregunta3.html?interes=detalls" class="btn-opcio">Els petits detalls</a>
    </div>
</div>

</body>
</html>
