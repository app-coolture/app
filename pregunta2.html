<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Coolture - Interessos</title>
    <style>
        :root {
            --verde: #6b7a5a;
            --blanco: #ffffff;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenedor principal: 390px, sin bordes redondeados */
        .container {
            width: 390px;
            min-height: 100vh;
            background-color: var(--verde);
            border-radius: 0;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Notch eliminado */

        .logo {
            width: 100px;
            margin-top: 80px; /* Ajustado para compensar la falta de notch */
        }

        .pregunta {
            color: var(--blanco);
            font-size: 24px;
            font-weight: 300;
            margin-top: 50px;
            text-align: center;
            padding: 0 30px;
            line-height: 1.2;
        }

        /* Contenedor de botones con scroll */
        .button-group {
            width: 85%;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            max-height: 450px;
            scrollbar-width: none;
        }

        .button-group::-webkit-scrollbar {
            display: none;
        }

        .btn-opcio {
            background-color: var(--blanco);
            color: #333;
            text-decoration: none;
            text-align: center;
            padding: 16px 0;
            border-radius: 40px;
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-opcio:active {
            transform: scale(0.96);
            background-color: #f8f8f8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Notch eliminado -->
        
        <img src="images/logos-02.png" class="logo" alt="Logo">

        <h2 class="pregunta">Què t'agrada descobrir més?</h2>

        <div class="button-group">
            <a href="home.html?interes=musica" class="btn-opcio">Música i Art</a>
            <a href="home.html?interes=gastronomia" class="btn-opcio">Gastronomia</a>
            <a href="home.html?interes=tradicions" class="btn-opcio">Tradicions</a>
            <a href="home.html?interes=historia" class="btn-opcio">Història i llocs</a>
            <a href="home.html?interes=festes" class="btn-opcio">Festes Populars</a>
        </div>
    </div>
</body>
</html>
