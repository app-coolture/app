<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Coolture - Interessos</title>
    <style>
        :root {
            --verde: #6b7a5a;
            --blanco: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 100%;
            overflow-x: hidden;
        }

        /* Contenedor principal: OCUPA EL 100% DEL ANCHO (sin límite fijo) */
        .container {
            width: 100%;
            min-height: 100vh;
            background-color: var(--verde);
            border-radius: 0;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            /* Espacio dinámico para el notch */
            padding-top: constant(safe-area-inset-top);
            padding-top: env(safe-area-inset-top);
            padding-bottom: constant(safe-area-inset-bottom);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .logo {
            width: clamp(70px, 25vw, 100px);
            margin-top: clamp(40px, 15vh, 80px);
        }

        .pregunta {
            color: var(--blanco);
            font-size: clamp(18px, 6vw, 24px);
            font-weight: 300;
            margin-top: clamp(30px, 10vh, 50px);
            text-align: center;
            padding: 0 20px;
            line-height: 1.2;
        }

        /* Contenedor de botones con scroll */
        .button-group {
            width: 85%;
            max-width: 280px;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 4vh, 15px);
            overflow-y: auto;
            max-height: 450px;
            scrollbar-width: none;
            flex: 1;
            margin-bottom: 40px;
        }

        .button-group::-webkit-scrollbar {
            display: none;
        }

        .btn-opcio {
            background-color: var(--blanco);
            color: #333;
            text-decoration: none;
            text-align: center;
            padding: clamp(12px, 4vh, 16px) 0;
            border-radius: 40px;
            font-weight: bold;
            font-size: clamp(11px, 3.5vw, 13px);
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-opcio:active {
            transform: scale(0.96);
            background-color: #f8f8f8;
        }

        /* Media queries para pantallas pequeñas */
        @media (max-width: 400px) {
            .button-group {
                width: 90%;
            }
        }

        @media (max-width: 360px) {
            .pregunta {
                margin-top: 30px;
            }
            .button-group {
                margin-top: 30px;
                gap: 12px;
            }
        }

        @media (max-width: 320px) {
            .btn-opcio {
                padding: 10px 0;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/logos-02.png" class="logo" alt="Logo Coolture">

        <h2 class="pregunta">Què t'agrada descobrir més?</h2>

        <div class="button-group">
            <a href="home.html?interes=musica" class="btn-opcio">Música i Art</a>
            <a href="home.html?interes=gastronomia" class="btn-opcio">Gastronomia</a>
            <a href="home.html?interes=tradicions" class="btn-opcio">Tradicions</a>
            <a href="home.html?interes=historia" class="btn-opcio">Història i llocs</a>
            <a href="home.html?interes=festes" class="btn-opcio">Festes Populars</a>
        </div>
    </div>
</body>
</html>
