<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Coolture - Forum Pro</title>
    <style>
        :root {
            --bg-color: #F5F1E8; 
            --green-coolture: #667F57;
            --select-bg: #F4F1E8;
            --white: #ffffff;
            --reddit-grey: #7c7c7c;
            --reddit-border: #cccbc4;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 375px; height: 812px;
            background-color: var(--bg-color);
            border-radius: 40px; overflow: hidden;
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .notch { width: 120px; height: 35px; border-radius: 20px; margin: 12px auto; background: black; flex-shrink: 0; z-index: 2100; }

        /* --- MENÚ BURGER (Z-INDEX AUMENTADO PARA ESTAR POR ENCIMA DE TODO) --- */
        .menu-overlay {
            position: absolute; top: 0; left: -100%; width: 80%; height: 100%;
            background: var(--bg-color); 
            z-index: 4000; /* Por encima de la navbar y el modal */
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.2);
            border-top-right-radius: 30px; border-bottom-right-radius: 30px;
        }
        .menu-overlay.active { left: 0; }
        
        .overlay-bg { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.5); 
            z-index: 3500; /* Por encima de la navbar pero bajo el menú */
            display: none; 
        }
        .overlay-bg.active { display: block; }

        .menu-scroll-content { padding: 20px; overflow-y: auto; flex-grow: 1; padding-bottom: 100px; }
        .close-menu { position: sticky; top: 0; align-self: flex-end; font-size: 32px; cursor: pointer; color: var(--green-coolture); background: var(--bg-color); width: 100%; text-align: right; padding: 10px 20px; z-index: 100; }
        
        .menu-title { font-size: 13px; font-weight: bold; margin: 15px 0 10px 5px; color: var(--green-coolture); text-transform: uppercase; }
        .pill-list { display: flex; flex-direction: column; gap: 8px; }
        .pill { border: 1.5px solid #000; border-radius: 30px; padding: 10px; font-size: 13px; text-align: center; font-weight: 600; background: white; cursor: pointer; transition: 0.3s; }
        .pill.selected { background: var(--green-coolture); color: white; border-color: var(--green-coolture); }
        .divider-green { height: 4px; background: var(--green-coolture); margin: 20px 0; border-radius: 10px; opacity: 0.3; }

        /* --- HEADER --- */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; flex-shrink: 0; z-index: 1000; }
        .burger { font-size: 28px; cursor: pointer; color: var(--green-coolture); }
        .logo-mini { width: 80px; }

        /* --- FEED --- */
        #feed { flex-grow: 1; overflow-y: auto; padding-bottom: 120px; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .post-card { background: var(--white); border-bottom: 1px solid var(--reddit-border); padding: 15px; }
        .user-info { font-size: 11px; font-weight: bold; color: var(--reddit-grey); margin-bottom: 5px; }
        .tags { display: flex; gap: 5px; margin-bottom: 8px; }
        .tag-pill { font-size: 9px; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; background: #e8ede4; color: var(--green-coolture); }
        .post-title { font-size: 16px; margin: 5px 0; color: #1c1c1c; font-weight: 700; }
        .post-text { font-size: 14px; color: #444; line-height: 1.4; }
        .actions { display: flex; gap: 15px; font-size: 13px; font-weight: bold; color: var(--reddit-grey); margin-top: 10px; }
        .btn-comment { cursor: pointer; color: var(--green-coolture); }

        /* --- NAVBAR INFERIOR --- */
        .navbar {
            position: absolute; bottom: 0; width: 100%; height: 85px;
            background-color: var(--green-coolture); display: flex;
            justify-content: space-around; align-items: center;
            padding-bottom: 10px; box-sizing: border-box; 
            z-index: 5000; /* Nivel intermedio */
        }
        .nav-item { display: flex; align-items: center; justify-content: center; text-decoration: none; width: 65px; height: 60px; }
        .nav-item.active { background-color: var(--select-bg); border-radius: 20px; }
        .nav-icon { width: 45px; height: 45px; object-fit: contain; }

        /* --- MODAL COMENTARIOS --- */
        .modal {
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 75%;
            background: white; z-index: 5000; transition: 0.4s ease;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            display: flex; flex-direction: column;
        }
        .modal.active { bottom: 0; }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .comment-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .comment-item { margin-bottom: 12px; font-size: 13px; border-bottom: 1px solid #f2f2f2; padding-bottom: 8px; }
        .input-box { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; padding-bottom: 40px; background: white; }
        .input-box input { flex-grow: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none; background: white; color: black; }
        .send-btn { background: var(--green-coolture); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
        .send-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="container">
    <div class="notch"></div>
    <div class="overlay-bg" id="overlay" onclick="closeAll()"></div>

    <div class="menu-overlay" id="sideMenu">
        <div class="close-menu" onclick="toggleMenu()">✕</div>
        <div class="menu-scroll-content">
            <div class="menu-title">Secció Temes</div>
            <div class="pill-list" id="listaTemas">
                <div onclick="setFiltre('tema', 'Gastronomia', this)" class="pill">Gastronomia</div>
                <div onclick="setFiltre('tema', 'Lenguaje', this)" class="pill">Lenguaje</div>
                <div onclick="setFiltre('tema', 'Musica y Arte', this)" class="pill">Musica y Arte</div>
                <div onclick="setFiltre('tema', 'Celebraciones', this)" class="pill">Celebraciones</div>
                <div onclick="setFiltre('tema', 'Vivencias', this)" class="pill">Vivencias</div>
                <div onclick="setFiltre('tema', 'Leyendas', this)" class="pill">Leyendas</div>
                <div onclick="setFiltre('tema', 'Entorno', this)" class="pill">Entorno</div>
                <div onclick="setFiltre('tema', 'Arquitectura', this)" class="pill">Arquitectura</div>
            </div>
            <div class="divider-green"></div>
            <div class="menu-title">Secció Continents</div>
            <div class="pill-list" id="listaContinentes">
                <div onclick="setFiltre('continente', 'Europa', this)" class="pill">Europa</div>
                <div onclick="setFiltre('continente', 'África', this)" class="pill">África</div>
                <div onclick="setFiltre('continente', 'Antartida', this)" class="pill">Antartida</div>
                <div onclick="setFiltre('continente', 'América', this)" class="pill">América</div>
                <div onclick="setFiltre('continente', 'Asia', this)" class="pill">Asia</div>
                <div onclick="setFiltre('continente', 'Oceania', this)" class="pill">Oceania</div>
            </div>
        </div>
    </div>

    <div class="modal" id="commentModal">
        <div class="modal-header"><b>Comentaris</b><span onclick="closeComments()" style="cursor:pointer; font-size:20px;">✕</span></div>
        <div class="comment-list" id="commentList"></div>
        <div class="input-box">
            <input type="text" id="newComment" placeholder="Escriu la teva resposta...">
            <button class="send-btn" onclick="submitComment()">↑</button>
        </div>
    </div>

    <div class="header">
        <div class="burger" onclick="toggleMenu()">☰</div>
        <img src="images/logos-02.png" class="logo-mini" alt="logo">
        <div style="width:28px"></div>
    </div>

    <div id="feed"></div>

    <nav class="navbar">
        <a href="culturas.html" class="nav-item active">
            <img src="images/forum2.png" class="nav-icon" alt="Forum">
        </a>
        <a href="quizz.html" class="nav-item">
            <img src="images/quizz.png" class="nav-icon" alt="Quizz">
        </a>
        <a href="pasaporte.html" class="nav-item"> 
            <img src="images/passaport.png" class="nav-icon" alt="Passaport">
        </a>
        <a href="perfil.html" class="nav-item"> 
            <img src="images/perfil.png" class="nav-icon" alt="Perfil">
        </a>
    </nav>
</div>

<script>
    // ======================== DATOS EXTENSOS: 60 POSTS, MÚLTIPLES USUARIOS Y COMENTARIOS ========================
    // Generamos una base de datos rica con 60 publicaciones, cada una con comentarios variados.
    // Los temas y continentes respetan las opciones del menú.
    
    const TEMAS = ["Gastronomia", "Lenguaje", "Musica y Arte", "Celebraciones", "Vivencias", "Leyendas", "Entorno", "Arquitectura"];
    const CONTINENTES = ["Europa", "África", "Antartida", "América", "Asia", "Oceania"];
    
    // Crear una lista amplia de usuarios (20 diferentes, incluyendo "Tu" como id 10)
    const USUARIOS_BASE = [
        { id: 1, name: "Marc_99" }, { id: 2, name: "Marta_G" }, { id: 3, name: "LauraExplora" }, { id: 4, name: "Carlos_Folk" },
        { id: 5, name: "Sofia_Andes" }, { id: 6, name: "RamenLover" }, { id: 7, name: "KyotoDreams" }, { id: 8, name: "NileWalker" },
        { id: 9, name: "TangoVibes" }, { id: 10, name: "Tu" }, { id: 11, name: "PolarAdventurer" }, { id: 12, name: "SambaTrue" },
        { id: 13, name: "AlpacaMystic" }, { id: 14, name: "MedinaStories" }, { id: 15, name: "BorealLight" }, { id: 16, name: "OutbackSpirit" },
        { id: 17, name: "Flamenco_Root" }, { id: 18, name: "SilkRoad_Globe" }, { id: 19, name: "MaoriGuardian" }, { id: 20, name: "PatagoniaWinds" }
    ];
    
    // Frases para títulos y cuerpos variados y culturales
    const titulosPorTema = {
        "Gastronomia": ["Misterios del mole", "Pasta fresca artesanal", "Café etíope tradicional", "Dim sum perfecto", "Parrilla argentina", "Especias de Marrakech", "Ceviche ecuatoriano", "Quesos alpinos"],
        "Lenguaje": ["Palabras intraducibles", "El arte del silencio", "Gestos que hablan", "Orígenes del catalán", "Dialectos andinos", "Lenguas en peligro", "Jerga juvenil global", "Poesía náhuatl"],
        "Musica y Arte": ["Tambores de Senegal", "Flamenco fusión", "K-pop identidad", "Pintura rupestre", "Graffiti como voz", "Ópera de Pekín", "Murales de Detroit", "Arte textil andino"],
        "Celebraciones": ["Diwali en Delhi", "Oktoberfest local", "Carnaval de Barranquilla", "Año nuevo lunar", "Inti Raymi", "Día de los Muertos", "Feria de Abril", "Holi colores"],
        "Vivencias": ["Viajar sola por India", "Voluntariado en Tanzania", "Aprendiendo quechua", "Nómada digital en Bali", "Perdidos en Transilvania", "Un té con beduinos", "Cocina con abuelas", "Rituales de bienvenida"],
        "Leyendas": ["El Pombero", "La Llorona ancestral", "Dragon de Komodo", "Yeti del Himalaya", "Sirenas del Danubio", "Chullachaqui", "Tupac Amaru mítico", "Mito de la Serpiente"],
        "Entorno": ["Selva amazónica viva", "Desierto del Sáhara", "Fiordos noruegos", "Barrera de coral", "Parques de Yellowstone", "Picos del Himalaya", "Estepa mongola", "Volcanes de Islandia"],
        "Arquitectura": ["Casas colgantes", "Rascacielos bioclimáticos", "Templos dorados", "Arquitectura de barro", "Fortalezas incas", "Palacios de hielo", "Gran Mezquita", "Museo del mañana"]
    };
    
    const cuerposInspiracion = [
        "Una experiencia que cambió mi perspectiva cultural. Me fascinó cada detalle.",
        "Tradición viva, cada rincón cuenta una historia milenaria.",
        "Descubrí sabores y aromas que nunca olvidaré. ¡Altamente recomendado!",
        "El respeto por las raíces es increíble en esta comunidad.",
        "Me emocionó la calidez de la gente y sus costumbres únicas.",
        "¿Alguien más ha vivido algo similar? Me encantaría leer sus anécdotas.",
        "Un patrimonio que debemos proteger y difundir. ⚡",
        "Me pregunto cómo ha evolucionado esta tradición en el siglo XXI.",
        "Increíble sincretismo cultural, lleno de simbolismo.",
        "Naturaleza y espiritualidad se unen de forma magistral."
    ];
    
    // Generar posts (60) de forma dinámica y asegurar variedad
    function generarPostsYComentarios() {
        const posts = [];
        const comments = [];
        let postId = 101;  // mantener ids consistentes y no colisionar
        const usuarios = [...USUARIOS_BASE];
        
        // Bucle para 60 posts
        for (let i = 0; i < 60; i++) {
            const tema = TEMAS[Math.floor(Math.random() * TEMAS.length)];
            const continente = CONTINENTES[Math.floor(Math.random() * CONTINENTES.length)];
            const usuarioAleatorio = usuarios[Math.floor(Math.random() * usuarios.length)];
            const tituloPool = titulosPorTema[tema] || ["Costumbres ancestrales", "Patrimonio cultural"];
            const titulo = tituloPool[Math.floor(Math.random() * tituloPool.length)] + (Math.random() > 0.7 ? " · reflexió" : "");
            const cuerpoBase = cuerposInspiracion[Math.floor(Math.random() * cuerposInspiracion.length)];
            const cuerpoExtendido = cuerpoBase + " " + (Math.random() > 0.5 ? "Comparte la teva opinió! 🌍" : "Què en penses? #Coolture");
            const likes = Math.floor(Math.random() * 280) + 10;
            
            posts.push({
                id: postId,
                userId: usuarioAleatorio.id,
                tema: tema,
                cont: continente,
                title: titulo,
                body: cuerpoExtendido,
                likes: likes
            });
            
            // Añadir entre 2 y 6 comentarios por cada post (riqueza conversacional)
            const numComentarios = Math.floor(Math.random() * 5) + 2; // mínimo 2 comentarios
            for (let c = 0; c < numComentarios; c++) {
                const comentarista = usuarios[Math.floor(Math.random() * usuarios.length)];
                let textoComentario = "";
                const opciones = [
                    "Qué bonita tradición, gracias por compartir 🙌",
                    "Me encantaría vivir esa experiencia algún día.",
                    "Justo estaba investigando sobre esto, gran aporte!",
                    "¿Sabes dónde puedo encontrar más información?",
                    "Totalmente de acuerdo, la diversidad cultural nos enriquece.",
                    "Yo lo viví en el 2022 y fue mágico ✨",
                    "Interesante punto de vista, nunca lo había pensado así.",
                    "Tengo una anécdota parecida, que recuerdos!",
                    "Esto debería preservarse como patrimonio.",
                    "Gracias por difundir estas maravillas."
                ];
                textoComentario = opciones[Math.floor(Math.random() * opciones.length)];
                // algunos comentarios más largos
                if (Math.random() > 0.8) textoComentario += " Además, he leído que influye mucho en la identidad local.";
                comments.push({
                    id: Date.now() + postId + c + Math.random() * 10000,
                    postId: postId,
                    userId: comentarista.id,
                    text: textoComentario
                });
            }
            postId++;
        }
        
        // Aseguramos que hay comentarios adicionales para cada post (si alguno por error no llego a 2, pero arriba ya son 2-6)
        // También se podrían añadir algunos comentarios del usuario "Tu" para dinamismo
        // Inyectamos algunos comentarios extra firmados por "Tu" (id 10) en posts aleatorios para fomentar interacción
        for (let i = 0; i < 25; i++) {
            const postRandom = posts[Math.floor(Math.random() * posts.length)];
            comments.push({
                id: Date.now() + i + 999999,
                postId: postRandom.id,
                userId: 10,
                text: "M'encanta aquest tema! Jo també vaig viure una experiència semblant. 💬"
            });
        }
        
        return { posts, comments };
    }
    
    // Creamos dataset completo y luego comprobamos localStorage
    const freshData = generarPostsYComentarios();
    const FULL_USERS = USUARIOS_BASE;
    
    // Database inicial completa (60 posts + comentarios + usuarios)
    const COMPLETE_DB = {
        users: FULL_USERS,
        posts: freshData.posts,
        comments: freshData.comments
    };
    
    // Estrategia de carga: Si localStorage está vacío o el número de posts es menor a 60 (para garantizar 60 publicaciones),
    // se sobreescribe con la base completa. Además se garantiza que el input de comentarios guarde correctamente.
    let DB;
    
    function initDatabase() {
        const stored = localStorage.getItem('coolture_db');
        if (stored) {
            const parsed = JSON.parse(stored);
            // Si ya existen 60 o más posts, usamos esa base (para no machacar datos guardados recientemente por usuario)
            if (parsed.posts && parsed.posts.length >= 60) {
                DB = parsed;
            } else {
                DB = JSON.parse(JSON.stringify(COMPLETE_DB));
                localStorage.setItem('coolture_db', JSON.stringify(DB));
            }
        } else {
            DB = JSON.parse(JSON.stringify(COMPLETE_DB));
            localStorage.setItem('coolture_db', JSON.stringify(DB));
        }
        // Aseguramos que el usuario "Tu" (id 10) exista en la base (por si acaso)
        if (!DB.users.find(u => u.id === 10)) {
            DB.users.push({ id: 10, name: "Tu" });
        }
        // Aseguramos que no haya posts duplicados con id repetido (garantía)
        const uniqueIds = new Set();
        DB.posts = DB.posts.filter(p => {
            if (uniqueIds.has(p.id)) return false;
            uniqueIds.add(p.id);
            return true;
        });
        if (DB.posts.length < 60) {
            // Si por alguna razón aún hay menos de 60, añadimos más posts sin perder estructura
            const extraPosts = freshData.posts.slice(0, 60 - DB.posts.length);
            let maxId = Math.max(...DB.posts.map(p => p.id), 100);
            extraPosts.forEach(p => { p.id = ++maxId; DB.posts.push(p); });
        }
        localStorage.setItem('coolture_db', JSON.stringify(DB));
    }
    
    initDatabase();
    
    // Variables globales de filtros y estado
    let filtroTema = null;
    let filtroCont = null;
    let activePostId = null;
    
    function saveData() { 
        localStorage.setItem('coolture_db', JSON.stringify(DB)); 
    }
    
    function toggleMenu() { 
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        menu.classList.toggle('active'); 
        overlay.classList.toggle('active');
    }
    
    function closeAll() { 
        closeComments(); 
        document.getElementById('sideMenu').classList.remove('active'); 
        document.getElementById('overlay').classList.remove('active'); 
    }
    
    function setFiltre(tipus, valor, el) {
        if (tipus === 'tema') {
            if (filtroTema === valor) { 
                filtroTema = null; 
                el.classList.remove('selected'); 
            } else { 
                document.querySelectorAll('#listaTemas .pill').forEach(p => p.classList.remove('selected')); 
                filtroTema = valor; 
                el.classList.add('selected'); 
            }
        } else {
            if (filtroCont === valor) { 
                filtroCont = null; 
                el.classList.remove('selected'); 
            } else { 
                document.querySelectorAll('#listaContinentes .pill').forEach(p => p.classList.remove('selected')); 
                filtroCont = valor; 
                el.classList.add('selected'); 
            }
        }
        renderFeed();
        setTimeout(toggleMenu, 300);
    }
    
    function renderFeed() {
        const feed = document.getElementById('feed');
        if (!feed) return;
        feed.innerHTML = "";
        const filtrats = DB.posts.filter(p => (filtroTema ? p.tema === filtroTema : true) && (filtroCont ? p.cont === filtroCont : true));
        if (filtrats.length === 0) {
            feed.innerHTML = '<div style="padding: 40px; text-align: center; color: gray;">Cap publicació amb aquests filtres 🌱</div>';
            return;
        }
        filtrats.forEach(post => {
            const user = DB.users.find(u => u.id === post.userId) || { name: "Anònim" };
            const postComments = DB.comments.filter(c => c.postId === post.id);
            const commentCount = postComments.length;
            feed.innerHTML += `
                <div class="post-card">
                    <div class="user-info">u/${user.name}</div>
                    <div class="tags"><span class="tag-pill">${post.tema}</span><span class="tag-pill">${post.cont}</span></div>
                    <h3 class="post-title">${escapeHtml(post.title)}</h3>
                    <p class="post-text">${escapeHtml(post.body)}</p>
                    <div class="actions"><span>⬆️ ${post.likes}</span><span class="btn-comment" onclick="openComments(${post.id})">💬 ${commentCount}</span></div>
                </div>`;
        });
    }
    
    // pequeño helper para evitar XSS (por si acaso)
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    function openComments(postId) {
        activePostId = postId;
        const list = document.getElementById('commentList');
        if (!list) return;
        const postComments = DB.comments.filter(c => c.postId === postId);
        if (postComments.length === 0) {
            list.innerHTML = '<div style="padding: 12px; text-align:center; color:gray;">Encara no hi ha comentaris. Sigues el primer ✍️</div>';
        } else {
            list.innerHTML = postComments.map(c => {
                const user = DB.users.find(u => u.id === c.userId) || { name: "Anònim" };
                return `<div class="comment-item"><b>@${escapeHtml(user.name)}</b> ${escapeHtml(c.text)}</div>`;
            }).join('');
        }
        document.getElementById('commentModal').classList.add('active');
        document.getElementById('overlay').classList.add('active');
        // Enfocar input automáticamente
        setTimeout(() => {
            const inputField = document.getElementById('newComment');
            if (inputField) inputField.focus();
        }, 200);
    }
    
    function closeComments() { 
        document.getElementById('commentModal').classList.remove('active'); 
        document.getElementById('overlay').classList.remove('active'); 
        activePostId = null;
    }
    
    function submitComment() {
        const input = document.getElementById('newComment');
        if (!input || !input.value.trim()) return;
        if (!activePostId) return;
        const newText = input.value.trim();
        DB.comments.push({ 
            id: Date.now() + Math.random() * 10000, 
            postId: activePostId, 
            userId: 10, 
            text: newText 
        });
        saveData();
        input.value = "";
        // Refrescar modal y feed
        openComments(activePostId);
        renderFeed();
    }
    
    // Exponer funciones globales
    window.toggleMenu = toggleMenu;
    window.setFiltre = setFiltre;
    window.openComments = openComments;
    window.closeComments = closeComments;
    window.submitComment = submitComment;
    window.closeAll = closeAll;
    
    // Inicializar feed y comprobar que los comentarios funcionan
    document.addEventListener('DOMContentLoaded', () => {
        renderFeed();
        // Si por algún motivo el input del modal no tuviese evento, ya está bindeado en el onclick.
        // También agregamos evento por si pulsan enter en el input
        const commentInput = document.getElementById('newComment');
        if (commentInput) {
            commentInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    submitComment();
                }
            });
        }
    });
    
    // Pequeño parche para asegurar que el modal overlay no bloquee inputs (ya funciona)
    // También aseguramos que la base de datos nunca pierda los 60 posts en caso de recarga accidental con filtros.
    if (DB.posts.length < 60) {
        // recomponer otra vez
        const finalFix = generarPostsYComentarios();
        const existingIds = new Set(DB.posts.map(p => p.id));
        let newId = Math.max(...DB.posts.map(p => p.id), 200);
        for (let p of finalFix.posts) {
            if (!existingIds.has(p.id) && DB.posts.length < 60) {
                p.id = ++newId;
                DB.posts.push(p);
                existingIds.add(p.id);
            }
            if (DB.posts.length >= 60) break;
        }
        saveData();
        renderFeed();
    }
</script>
</body>
</html>
